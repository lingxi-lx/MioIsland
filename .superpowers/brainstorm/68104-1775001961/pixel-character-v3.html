<h2>CodeIsland - Pixel Character v3</h2>
<p class="subtitle">Monochrome. One accent color per state. White body. Dark background does the work.</p>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;">

  <!-- Idle -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">IDLE</div>
    <canvas id="idle" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- Working -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">WORKING</div>
    <canvas id="working" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- Needs You -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">NEEDS YOU</div>
    <canvas id="waiting" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- Thinking -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">THINKING</div>
    <canvas id="thinking" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- Error -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">ERROR</div>
    <canvas id="error" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- Done -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">DONE</div>
    <canvas id="done" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

</div>

<div style="margin-top:16px;display:flex;gap:24px;justify-content:center;">
  <div style="display:flex;align-items:center;gap:6px;"><div style="width:8px;height:8px;background:#ffffff;"></div><span style="color:#444;font-size:11px;">body (always white)</span></div>
  <div style="display:flex;align-items:center;gap:6px;"><div style="width:8px;height:8px;background:#555;"></div><span style="color:#444;font-size:11px;">accent (one per state)</span></div>
</div>

<script>
const P = 5;

function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

// Shared body: white, minimal
function body(ctx, x, y, alpha=1) {
  // Head 3x3 cross
  px(ctx, x+1, y, '#fff', alpha);
  px(ctx, x, y+1, '#fff', alpha);
  px(ctx, x+1, y+1, '#fff', alpha);
  px(ctx, x+2, y+1, '#fff', alpha);
  px(ctx, x+1, y+2, '#fff', alpha);
  // Body 3x2
  px(ctx, x, y+3, '#fff', alpha);
  px(ctx, x+1, y+3, '#fff', alpha);
  px(ctx, x+2, y+3, '#fff', alpha);
  px(ctx, x, y+4, '#fff', alpha);
  px(ctx, x+1, y+4, '#fff', alpha);
  px(ctx, x+2, y+4, '#fff', alpha);
  // Legs
  px(ctx, x, y+5, '#fff', alpha);
  px(ctx, x+2, y+5, '#fff', alpha);
}

function eyes(ctx, x, y, open=true) {
  if (open) {
    px(ctx, x, y+1, '#0d0d0d');
    px(ctx, x+2, y+1, '#0d0d0d');
  } else {
    px(ctx, x, y+1, '#555', 0.4);
    px(ctx, x+2, y+1, '#555', 0.4);
  }
}

// === IDLE: breathing, blink, shadow ===
(function(){
  const c = document.getElementById('idle').getContext('2d');
  let f = 0;
  (function draw(){
    c.clearRect(0,0,80,80);
    const bob = Math.round(Math.sin(f*0.04)*0.6);
    const by = 6+bob;
    // Shadow
    px(c, 6, 12, '#fff', 0.03);
    px(c, 7, 12, '#fff', 0.05);
    px(c, 8, 12, '#fff', 0.03);

    body(c, 6, by);
    eyes(c, 6, by, f%70>3);
    f++; requestAnimationFrame(draw);
  })();
})();

// === WORKING: typing, single-color sparks ===
(function(){
  const c = document.getElementById('working').getContext('2d');
  let f=0, sparks=[];
  (function draw(){
    c.clearRect(0,0,80,80);
    body(c, 4, 6);
    eyes(c, 4, 6);
    // Arm
    const arm = f%6<3;
    px(c, 7, 9, '#fff');
    px(c, 8, arm?9:10, '#fff');
    // Screen
    px(c, 9, 9, '#fff', 0.15);
    px(c, 10, 9, '#fff', 0.1+Math.sin(f*0.2)*0.08);
    px(c, 9, 10, '#fff', 0.08);
    px(c, 10, 10, '#fff', 0.12);
    px(c, 9, 11, '#fff', 0.06);
    px(c, 10, 11, '#fff', 0.06);

    // White sparks only
    if(f%5===0) sparks.push({
      x:9+Math.random()*2, y:8,
      vx:(Math.random()-0.3)*0.4, vy:-Math.random()*0.4-0.2,
      life:10+Math.random()*8
    });
    sparks.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy; s.life--;
      px(c, Math.round(s.x), Math.round(s.y), '#fff', s.life/18);
    });
    sparks=sparks.filter(s=>s.life>0);
    f++; requestAnimationFrame(draw);
  })();
})();

// === WAITING: one amber accent — the ? ===
(function(){
  const c = document.getElementById('waiting').getContext('2d');
  let f=0;
  const AMBER = '#F59E0B';
  (function draw(){
    c.clearRect(0,0,80,80);
    body(c, 5, 7);
    // Eyes looking up
    px(c, 5, 7, '#0d0d0d');
    px(c, 7, 7, '#0d0d0d');
    // Raised arm
    px(c, 8, 9, '#fff');
    px(c, 8, 8, '#fff');

    // Floating ? — the only color
    const qy = 3 + Math.round(Math.sin(f*0.05)*1.2);
    const a = 0.5 + Math.sin(f*0.04)*0.3;
    px(c, 10, qy, AMBER, a);
    px(c, 11, qy, AMBER, a);
    px(c, 11, qy+1, AMBER, a);
    px(c, 10, qy+2, AMBER, a);
    px(c, 10, qy+4, AMBER, a*0.7);

    f++; requestAnimationFrame(draw);
  })();
})();

// === THINKING: orbiting dots, single purple accent ===
(function(){
  const c = document.getElementById('thinking').getContext('2d');
  let f=0;
  (function draw(){
    c.clearRect(0,0,80,80);
    const bob = Math.round(Math.sin(f*0.03)*0.4);
    body(c, 6, 6+bob, 0.6);
    eyes(c, 6, 6+bob, false);

    // Orbiting white dots
    for(let i=0;i<3;i++){
      const angle = f*0.03 + i*Math.PI*2/3;
      const r = 3.5 + Math.sin(f*0.015+i)*0.5;
      const ox = 7 + Math.cos(angle)*r;
      const oy = 8+bob + Math.sin(angle)*r*0.5;
      px(c, Math.round(ox), Math.round(oy), '#fff', 0.2+Math.sin(f*0.04+i*2)*0.15);
    }
    // Subtle ground glow
    px(c, 6, 13, '#fff', 0.03);
    px(c, 7, 13, '#fff', 0.05);
    px(c, 8, 13, '#fff', 0.03);

    f++; requestAnimationFrame(draw);
  })();
})();

// === ERROR: fallen, rotating star ===
(function(){
  const c = document.getElementById('error').getContext('2d');
  let f=0;
  (function draw(){
    c.clearRect(0,0,80,80);
    // Fallen sideways — horizontal body
    px(c, 3, 9, '#fff', 0.7);
    px(c, 4, 8, '#fff', 0.7);
    px(c, 4, 9, '#fff', 0.7);
    px(c, 4, 10, '#fff', 0.7);
    px(c, 5, 9, '#fff', 0.7);
    px(c, 6, 8, '#fff', 0.5);
    px(c, 6, 9, '#fff', 0.5);
    px(c, 6, 10, '#fff', 0.5);
    px(c, 7, 9, '#fff', 0.5);
    px(c, 8, 9, '#fff', 0.4);
    // X eyes
    px(c, 3, 9, '#555', 0.6);
    px(c, 4, 9, '#555', 0.6);

    // Single rotating star — only accent
    for(let i=0;i<3;i++){
      const a = f*0.06 + i*Math.PI*2/3;
      const sx = 5.5 + Math.cos(a)*2;
      const sy = 5 + Math.sin(a)*1.2;
      px(c, Math.round(sx), Math.round(sy), '#fff', 0.4+Math.sin(f*0.08+i)*0.2);
    }

    f++; requestAnimationFrame(draw);
  })();
})();

// === DONE: flag + single burst ===
(function(){
  const c = document.getElementById('done').getContext('2d');
  let f=0, particles=[];
  (function draw(){
    c.clearRect(0,0,80,80);
    const jump = f<40 ? Math.abs(Math.sin(f*0.12))*1.5 : 0;
    const by = 6-Math.round(jump);

    body(c, 5, by);
    // Happy eyes
    px(c, 5, by+1, '#0d0d0d');
    px(c, 7, by+1, '#0d0d0d');

    // Flag pole
    for(let i=1;i<=5;i++) px(c, 10, by+i, '#fff', 0.3);
    // Flag — small
    px(c, 11, by+1, '#fff', 0.6 + (f%20>10?0.2:0));
    px(c, 12, by+1, '#fff', 0.4 + (f%20>10?0.2:0));
    px(c, 11, by+2, '#fff', 0.5);

    // White-only particles
    if(f%12===0 && particles.length<15){
      const ox = 3+Math.random()*10;
      for(let i=0;i<4;i++){
        const a = i/4*Math.PI*2+Math.random()*0.5;
        particles.push({
          x:ox, y:2+Math.random()*2,
          vx:Math.cos(a)*0.25, vy:Math.sin(a)*0.25,
          life:12+Math.random()*8
        });
      }
    }
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.008; p.life--;
      px(c, Math.round(p.x), Math.round(p.y), '#fff', p.life/20);
    });
    particles=particles.filter(p=>p.life>0);

    f++; requestAnimationFrame(draw);
  })();
})();
</script>
