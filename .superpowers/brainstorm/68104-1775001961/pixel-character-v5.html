<h2>CodeIsland - Pixel Character v5</h2>
<p class="subtitle">Warm skin tones. Colored outfits. No white. NEEDS YOU redesigned.</p>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;">

  <!-- IDLE -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">IDLE</div>
    <canvas id="idle" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- WORKING -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">WORKING</div>
    <canvas id="working" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- NEEDS YOU -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">NEEDS YOU</div>
    <canvas id="waiting" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- THINKING -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">THINKING</div>
    <canvas id="thinking" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- ERROR -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">ERROR</div>
    <canvas id="error" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- DONE -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">DONE</div>
    <canvas id="done" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

</div>

<script>
const P = 5;
function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

const SKIN = '#FFCB8E';
const SKIN_SHADOW = '#E8A86A';
const HAIR = '#5B3A29';

function head(c, x, y, a=1) {
  // Hair
  px(c, x, y, HAIR, a);
  px(c, x+1, y, HAIR, a);
  px(c, x+2, y, HAIR, a);
  // Face
  px(c, x, y+1, SKIN, a);
  px(c, x+1, y+1, SKIN, a);
  px(c, x+2, y+1, SKIN, a);
  px(c, x, y+2, SKIN_SHADOW, a);
  px(c, x+1, y+2, SKIN, a);
  px(c, x+2, y+2, SKIN_SHADOW, a);
}

function openEyes(c, x, y) {
  px(c, x, y+1, '#2D1B0E');
  px(c, x+2, y+1, '#2D1B0E');
}

function closedEyes(c, x, y, color='#C08050') {
  px(c, x, y+1, color, 0.5);
  px(c, x+2, y+1, color, 0.5);
}

// === IDLE: napping at desk, warm blue outfit, Zzz ===
(function(){
  const c = document.getElementById('idle').getContext('2d');
  let f=0;
  const SHIRT = '#5B7FBF';
  const SHIRT_D = '#4A6A9F';
  const ZZZ = '#7BA4E0';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Desk
    px(c, 3, 10, '#3D2B1F'); px(c, 4, 10, '#4A3728'); px(c, 5, 10, '#4A3728');
    px(c, 6, 10, '#4A3728'); px(c, 7, 10, '#4A3728'); px(c, 8, 10, '#4A3728');
    px(c, 9, 10, '#4A3728'); px(c, 10, 10, '#3D2B1F');

    // Arms resting on desk
    px(c, 5, 9, SKIN_SHADOW); px(c, 6, 9, SKIN); px(c, 7, 9, SKIN); px(c, 8, 9, SKIN_SHADOW);
    // Head resting on arms
    px(c, 5, 7, HAIR); px(c, 6, 7, HAIR); px(c, 7, 7, HAIR);
    px(c, 5, 8, SKIN); px(c, 6, 8, SKIN); px(c, 7, 8, SKIN_SHADOW);
    // Closed eyes
    closedEyes(c, 5, 7);
    // Body behind desk
    px(c, 6, 10, SHIRT); px(c, 7, 10, SHIRT_D); px(c, 8, 10, SHIRT);

    // Feet dangling
    const swing = Math.sin(f * 0.04);
    px(c, 6, 11, SHIRT_D); px(c, 8, 11, SHIRT_D);
    px(c, 6+Math.round(swing*0.4), 12, '#6B4226', 0.7);
    px(c, 8-Math.round(swing*0.4), 12, '#6B4226', 0.7);

    // Zzz — warm blue, growing as they rise
    const cycle = f % 100;
    if (cycle < 70) {
      const a1 = Math.max(0, 0.7 - cycle*0.01);
      px(c, 10, 7 - Math.floor(cycle/20), ZZZ, a1*0.4);
      if (cycle > 20) {
        const a2 = Math.max(0, 0.7 - (cycle-20)*0.012);
        px(c, 11, 5 - Math.floor((cycle-20)/22), ZZZ, a2*0.6);
        px(c, 12, 5 - Math.floor((cycle-20)/22), ZZZ, a2*0.3);
      }
      if (cycle > 45) {
        const a3 = Math.max(0, 0.7 - (cycle-45)*0.015);
        px(c, 12, 3 - Math.floor((cycle-45)/25), ZZZ, a3*0.8);
        px(c, 13, 3 - Math.floor((cycle-45)/25), ZZZ, a3*0.5);
        px(c, 13, 2 - Math.floor((cycle-45)/25), ZZZ, a3*0.3);
      }
    }

    f++; requestAnimationFrame(draw);
  })();
})();

// === WORKING: green hoodie, cyan screen sparks ===
(function(){
  const c = document.getElementById('working').getContext('2d');
  let f=0, sparks=[];
  const HOODIE = '#3A9A5B';
  const HOODIE_D = '#2D7A48';
  const CYAN = '#67E8F9';
  const SCREEN = '#1A3A4A';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Character
    head(c, 4, 4);
    openEyes(c, 4, 4);
    // Hoodie body
    px(c, 4, 7, HOODIE); px(c, 5, 7, HOODIE); px(c, 6, 7, HOODIE_D);
    px(c, 4, 8, HOODIE_D); px(c, 5, 8, HOODIE); px(c, 6, 8, HOODIE_D);
    // Pants
    px(c, 4, 9, '#3B5998'); px(c, 6, 9, '#3B5998');

    // Arms typing
    const armF = f % 6 < 3;
    px(c, 7, 7, SKIN); px(c, 8, armF ? 7 : 8, SKIN_SHADOW);

    // Laptop screen — dark with cyan content
    px(c, 9, 5, SCREEN); px(c, 10, 5, SCREEN); px(c, 11, 5, SCREEN);
    px(c, 9, 6, SCREEN); px(c, 10, 6, SCREEN); px(c, 11, 6, SCREEN);
    px(c, 9, 7, SCREEN); px(c, 10, 7, SCREEN); px(c, 11, 7, SCREEN);
    // Code lines on screen
    const flicker = 0.4 + Math.sin(f*0.15)*0.15;
    px(c, 9, 5, CYAN, flicker*0.5); px(c, 10, 5, CYAN, flicker*0.3);
    px(c, 9, 6, CYAN, flicker*0.7); px(c, 10, 6, CYAN, flicker*0.4); px(c, 11, 6, CYAN, flicker*0.2);
    px(c, 10, 7, CYAN, flicker*0.3);
    // Laptop base
    px(c, 8, 8, '#555'); px(c, 9, 8, '#555'); px(c, 10, 8, '#555'); px(c, 11, 8, '#555'); px(c, 12, 8, '#555');

    // Cyan sparks
    if (f%4===0) sparks.push({
      x:10+Math.random()*1.5, y:4+Math.random()*2,
      vx:(Math.random()-0.2)*0.45, vy:-Math.random()*0.4-0.15,
      life:8+Math.random()*8
    });
    sparks.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy; s.life--;
      px(c, Math.round(s.x), Math.round(s.y), CYAN, s.life/16);
    });
    sparks=sparks.filter(s=>s.life>0);

    f++; requestAnimationFrame(draw);
  })();
})();

// === NEEDS YOU: character tapping foot, notification bell rings above ===
(function(){
  const c = document.getElementById('waiting').getContext('2d');
  let f=0;
  const AMBER = '#F59E0B';
  const AMBER_L = '#FCD34D';
  const VEST = '#D97706';
  const VEST_D = '#B45309';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Character standing, arms crossed, tapping foot
    head(c, 5, 5);
    // Eyes — looking right at you, slightly annoyed/expectant
    px(c, 5, 6, '#2D1B0E');
    px(c, 7, 6, '#2D1B0E');
    // Mouth — slight frown
    px(c, 6, 7, SKIN_SHADOW, 0.6);

    // Vest body — amber tones
    px(c, 5, 8, VEST); px(c, 6, 8, VEST_D); px(c, 7, 8, VEST);
    px(c, 5, 9, VEST_D); px(c, 6, 9, VEST); px(c, 7, 9, VEST_D);
    // Arms crossed
    px(c, 4, 8, SKIN); px(c, 8, 8, SKIN_SHADOW);
    px(c, 4, 9, SKIN_SHADOW); px(c, 8, 9, SKIN);

    // Legs — one foot tapping
    px(c, 5, 10, '#3B5998');
    px(c, 7, 10, '#3B5998');
    const tap = f % 30 < 15;
    px(c, 5, 11, '#6B4226');
    px(c, 7, 11, '#6B4226', tap ? 1 : 0.4);
    if (tap) px(c, 8, 11, '#6B4226', 0.3); // foot out

    // Bell above head — swinging
    const bellAngle = Math.sin(f * 0.12) * 0.6;
    const bx = 6 + Math.round(bellAngle);
    const by = 2;
    // Bell body
    px(c, bx, by, AMBER_L);
    px(c, bx-1, by+1, AMBER);
    px(c, bx, by+1, AMBER_L);
    px(c, bx+1, by+1, AMBER);
    // Bell clapper
    px(c, bx, by+2, VEST_D, 0.8);
    // Handle
    px(c, bx, by-1, AMBER, 0.5);

    // Ring waves — expand outward from bell
    const ring1 = (f % 40) / 40;
    const ring2 = ((f + 20) % 40) / 40;
    if (ring1 < 0.7) {
      const r1 = 1 + ring1 * 3;
      const a1 = 0.4 * (1 - ring1/0.7);
      for (let a = -1; a <= 1; a += 0.5) {
        px(c, Math.round(bx - r1), Math.round(by + a), AMBER_L, a1 * 0.5);
        px(c, Math.round(bx + r1), Math.round(by + a), AMBER_L, a1 * 0.5);
      }
    }
    if (ring2 < 0.7) {
      const r2 = 1 + ring2 * 3;
      const a2 = 0.3 * (1 - ring2/0.7);
      for (let a = -1; a <= 1; a += 0.5) {
        px(c, Math.round(bx - r2), Math.round(by + a), AMBER, a2 * 0.4);
        px(c, Math.round(bx + r2), Math.round(by + a), AMBER, a2 * 0.4);
      }
    }

    f++; requestAnimationFrame(draw);
  })();
})();

// === THINKING: purple robe, orbiting particles ===
(function(){
  const c = document.getElementById('thinking').getContext('2d');
  let f=0;
  const PURPLE = '#A78BFA';
  const PURPLE_D = '#7C5FC4';
  const PURPLE_L = '#C4B5FD';
  (function draw(){
    c.clearRect(0,0,80,80);
    const bob = Math.sin(f*0.025)*0.5;
    const by = 5+Math.round(bob);

    // Character cross-legged, meditating
    head(c, 6, by, 0.7);
    closedEyes(c, 6, by, PURPLE);
    // Robe
    px(c, 5, by+3, PURPLE_D, 0.6); px(c, 6, by+3, PURPLE, 0.6); px(c, 7, by+3, PURPLE_D, 0.6);
    px(c, 5, by+4, PURPLE, 0.5); px(c, 6, by+4, PURPLE_D, 0.5); px(c, 7, by+4, PURPLE, 0.5);
    px(c, 8, by+4, PURPLE_D, 0.4);
    // Cross legs
    px(c, 5, by+5, PURPLE_D, 0.4); px(c, 6, by+5, PURPLE, 0.35);
    px(c, 7, by+5, PURPLE, 0.35); px(c, 8, by+5, PURPLE_D, 0.4);
    // Hands in lap
    px(c, 5, by+4, SKIN, 0.4); px(c, 8, by+4, SKIN_SHADOW, 0.4);

    // Orbiting particles
    for(let i=0;i<3;i++){
      const angle = f*0.025 + i*Math.PI*2/3;
      const r = 3.5 + Math.sin(f*0.012+i)*0.6;
      const ox = 7 + Math.cos(angle)*r;
      const oy = by+2 + Math.sin(angle)*r*0.5;
      const pa = 0.3 + Math.sin(f*0.03+i*2)*0.2;
      px(c, Math.round(ox), Math.round(oy), PURPLE_L, pa);
    }
    // Ground glow
    px(c, 6, by+6, PURPLE, 0.04+Math.sin(f*0.03)*0.02);
    px(c, 7, by+6, PURPLE, 0.06+Math.sin(f*0.03)*0.02);
    px(c, 8, by+6, PURPLE, 0.04+Math.sin(f*0.03)*0.02);

    f++; requestAnimationFrame(draw);
  })();
})();

// === ERROR: red X with warm glow ===
(function(){
  const c = document.getElementById('error').getContext('2d');
  let f=0;
  const RED = '#EF4444';
  const RED_D = '#B91C1C';
  const RED_L = '#FCA5A5';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Warm glow
    const pulse = 0.06 + Math.sin(f*0.05)*0.03;
    for(let dy=-3;dy<=3;dy++) for(let dx=-3;dx<=3;dx++){
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<4) px(c, 7+dx, 7+dy, RED_D, pulse*(1-dist/4));
    }

    // X — two-tone red
    const xa = 0.75 + Math.sin(f*0.04)*0.15;
    px(c, 5, 5, RED, xa); px(c, 6, 6, RED_L, xa);
    px(c, 7, 7, RED, xa);
    px(c, 8, 8, RED_L, xa); px(c, 9, 9, RED, xa);
    px(c, 9, 5, RED, xa); px(c, 8, 6, RED_L, xa);
    px(c, 6, 8, RED_L, xa); px(c, 5, 9, RED, xa);

    f++; requestAnimationFrame(draw);
  })();
})();

// === DONE: green check with rising particles ===
(function(){
  const c = document.getElementById('done').getContext('2d');
  let f=0, particles=[];
  const GREEN = '#4ADE80';
  const GREEN_D = '#22C55E';
  const GREEN_L = '#86EFAC';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Warm glow
    const glow = 0.04 + Math.sin(f*0.04)*0.02;
    for(let dy=-3;dy<=3;dy++) for(let dx=-3;dx<=3;dx++){
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<4) px(c, 7+dx, 7+dy, GREEN_D, glow*(1-dist/4.5));
    }

    // Checkmark — two-tone green
    const ca = 0.75 + Math.sin(f*0.03)*0.15;
    px(c, 4, 7, GREEN_D, ca*0.6);
    px(c, 5, 8, GREEN, ca*0.8);
    px(c, 6, 9, GREEN_L, ca);
    px(c, 7, 8, GREEN, ca);
    px(c, 8, 7, GREEN_L, ca);
    px(c, 9, 6, GREEN, ca*0.9);
    px(c, 10, 5, GREEN_D, ca*0.8);

    // Rising particles — green gradient
    if(f%8===0 && particles.length<15){
      particles.push({
        x:4+Math.random()*7, y:10+Math.random()*2,
        vy:-0.1-Math.random()*0.1, life:20+Math.random()*15,
        color:[GREEN, GREEN_L, GREEN_D][Math.floor(Math.random()*3)]
      });
    }
    particles.forEach(p=>{
      p.y+=p.vy; p.life--;
      px(c, Math.round(p.x), Math.round(p.y), p.color, p.life/35);
    });
    particles=particles.filter(p=>p.life>0);

    f++; requestAnimationFrame(draw);
  })();
})();
</script>
