<h2>NEEDS YOU — Simple Wave</h2>

<div style="display:flex;justify-content:center;gap:40px;margin:40px 0;align-items:center;">
  <div style="text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:8px;font-family:monospace;">ACTUAL SIZE</div>
    <div style="background:#0d0d0d;border-radius:8px;padding:8px;display:inline-block;">
      <canvas id="small" width="50" height="50" style="image-rendering:pixelated;width:50px;height:50px;"></canvas>
    </div>
  </div>
  <div style="text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:8px;font-family:monospace;">4X ZOOM</div>
    <div style="background:#0d0d0d;border-radius:12px;padding:24px;display:inline-block;">
      <canvas id="big" width="50" height="50" style="image-rendering:pixelated;width:200px;height:200px;"></canvas>
    </div>
  </div>
</div>

<script>
const P = 5;
function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

const SKIN = '#FFCB8E';
const SKIN_S = '#E8A86A';
const HAIR = '#5B3A29';
const VEST = '#D97706';
const VEST_D = '#B45309';

function draw(c, f) {
  c.clearRect(0, 0, 50, 50);

  // Two-frame wave: hand at top-left or top-right of head
  const frame = Math.floor(f / 12) % 2;

  // Head
  px(c, 3, 3, HAIR); px(c, 4, 3, HAIR); px(c, 5, 3, HAIR);
  px(c, 3, 4, SKIN); px(c, 4, 4, SKIN); px(c, 5, 4, SKIN);
  px(c, 3, 5, SKIN_S); px(c, 4, 5, SKIN); px(c, 5, 5, SKIN_S);
  // Eyes
  px(c, 3, 4, '#2D1B0E');
  px(c, 5, 4, '#2D1B0E');

  // Body
  px(c, 3, 6, VEST); px(c, 4, 6, VEST_D); px(c, 5, 6, VEST);
  px(c, 3, 7, VEST_D); px(c, 4, 7, VEST); px(c, 5, 7, VEST_D);

  // Legs
  px(c, 3, 8, '#3B5998'); px(c, 5, 8, '#3B5998');

  // Left arm down
  px(c, 2, 6, SKIN_S);

  // Right arm — always raised, hand tilts left/right
  px(c, 6, 5, SKIN);  // arm connected to shoulder
  px(c, 6, 4, SKIN);  // upper arm straight up
  if (frame === 0) {
    px(c, 5, 3, SKIN); // hand tilts left (overlaps on head top-right)
  } else {
    px(c, 7, 3, SKIN); // hand tilts right
  }
}

let f = 0;
const c1 = document.getElementById('small').getContext('2d');
const c2 = document.getElementById('big').getContext('2d');
(function loop() {
  draw(c1, f);
  draw(c2, f);
  f++;
  requestAnimationFrame(loop);
})();
</script>
