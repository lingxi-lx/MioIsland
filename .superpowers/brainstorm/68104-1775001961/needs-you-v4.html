<h2>NEEDS YOU — Chibi Kowtow</h2>
<p class="subtitle">Squat proportions. Big head, tiny body. Fits in a square.</p>

<div style="display:flex;justify-content:center;gap:40px;margin:40px 0;align-items:center;">
  <!-- Actual size reference -->
  <div style="text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:8px;font-family:monospace;">ACTUAL SIZE</div>
    <div style="background:#0d0d0d;border-radius:8px;padding:8px;display:inline-block;">
      <canvas id="small" width="50" height="50" style="image-rendering:pixelated;width:50px;height:50px;"></canvas>
    </div>
  </div>
  <!-- Zoomed -->
  <div style="text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:8px;font-family:monospace;">4X ZOOM</div>
    <div style="background:#0d0d0d;border-radius:12px;padding:24px;display:inline-block;">
      <canvas id="big" width="50" height="50" style="image-rendering:pixelated;width:200px;height:200px;"></canvas>
    </div>
  </div>
</div>

<script>
const P = 5;
function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

const SKIN = '#FFCB8E';
const SKIN_S = '#E8A86A';
const HAIR = '#5B3A29';
const AMBER = '#F59E0B';
const AMBER_L = '#FCD34D';
const SHIRT = '#D97706';
const SHIRT_D = '#B45309';

function drawKowtow(c, f) {
  c.clearRect(0, 0, 50, 50);

  // Cycle: 0-25 upright, 25-40 bow down, 40-55 on ground, 55-70 rise, 70-100 pause
  const cycle = f % 100;
  const G = 8; // ground row

  // Ground
  for (let i = 0; i <= 9; i++) px(c, i, G, '#1a1a1a', 0.3);

  if (cycle < 25 || cycle >= 70) {
    // === UPRIGHT: big head, small body, kneeling side view ===
    // Head (3x3 — dominant)
    px(c, 2, 3, HAIR); px(c, 3, 3, HAIR); px(c, 4, 3, HAIR);
    px(c, 2, 4, SKIN); px(c, 3, 4, SKIN); px(c, 4, 4, SKIN);
    px(c, 2, 5, SKIN_S); px(c, 3, 5, SKIN); px(c, 4, 5, SKIN_S);
    // Eye
    px(c, 2, 4, '#2D1B0E');
    // Body (tiny, 2 rows)
    px(c, 3, 6, SHIRT); px(c, 4, 6, SHIRT_D);
    px(c, 3, 7, SHIRT_D); px(c, 4, 7, SHIRT);
    // Hands clasped forward
    px(c, 1, 6, SKIN); px(c, 2, 6, SKIN_S);
    // Knees
    px(c, 5, 7, '#3B5998'); px(c, 6, 7, '#3B5998');

  } else if (cycle < 40) {
    // === BOWING DOWN ===
    const t = (cycle - 25) / 15; // 0→1
    const headY = 3 + Math.round(t * 3);
    const headX = 2 - Math.round(t * 1);

    // Head dropping
    px(c, headX, headY, HAIR); px(c, headX+1, headY, HAIR); px(c, headX+2, headY, HAIR);
    px(c, headX, headY+1, SKIN); px(c, headX+1, headY+1, SKIN); px(c, headX+2, headY+1, SKIN);
    // Eyes closing
    px(c, headX, headY+1, SKIN_S, 0.5);
    // Body tilting
    px(c, 3, 6 + Math.round(t), SHIRT); px(c, 4, 6, SHIRT_D);
    px(c, 3, 7, SHIRT_D); px(c, 4, 7, SHIRT);
    // Arms going down
    px(c, headX, headY+1, SKIN_S);
    // Knees stay
    px(c, 5, 7, '#3B5998'); px(c, 6, 7, '#3B5998');

  } else if (cycle < 55) {
    // === ON GROUND — head down, butt up ===
    // Head flat (sideways on ground)
    px(c, 0, 7, HAIR); px(c, 1, 7, HAIR);
    px(c, 0, 6, SKIN, 0.8); px(c, 1, 6, SKIN);
    // Eyes shut
    px(c, 0, 6, SKIN_S, 0.3);
    // Arms stretched on ground
    px(c, 0, 7, SKIN_S, 0.6);
    // Back arched — butt up
    px(c, 2, 6, SHIRT); px(c, 3, 5, SHIRT_D);
    px(c, 2, 5, SHIRT);
    px(c, 4, 5, SHIRT_D); px(c, 4, 6, SHIRT);
    // Knees
    px(c, 5, 6, '#3B5998'); px(c, 5, 7, '#3B5998');
    px(c, 6, 7, '#6B4226', 0.5);

    // Impact flash on first frames
    if (cycle < 43) {
      const ia = (43 - cycle) / 5 * 0.3;
      px(c, 0, G, AMBER, ia); px(c, 1, G, AMBER_L, ia*0.7);
    }

    // Sweat
    if (cycle === 45 || cycle === 50) {
      // drawn as static since we're in a tight window
    }

  } else {
    // === RISING ===
    const t = 1 - (cycle - 55) / 15; // 1→0
    const headY = 3 + Math.round(t * 3);
    const headX = 2 - Math.round(t * 1);

    px(c, headX, headY, HAIR); px(c, headX+1, headY, HAIR); px(c, headX+2, headY, HAIR);
    px(c, headX, headY+1, SKIN); px(c, headX+1, headY+1, SKIN); px(c, headX+2, headY+1, SKIN);
    px(c, headX, headY+1, '#2D1B0E');
    px(c, 3, 6+Math.round(t), SHIRT); px(c, 4, 6, SHIRT_D);
    px(c, 3, 7, SHIRT_D); px(c, 4, 7, SHIRT);
    px(c, headX, headY+1, SKIN_S);
    px(c, 5, 7, '#3B5998'); px(c, 6, 7, '#3B5998');
  }

  // Amber glow beneath — always present, breathing
  const glow = 0.04 + Math.sin(f * 0.05) * 0.025;
  for (let dx = 0; dx <= 6; dx++) {
    px(c, dx + 1, G + 1, AMBER, glow * (1 - Math.abs(dx - 3) * 0.2));
  }
}

// Drive both canvases from same animation
let f = 0;
const c1 = document.getElementById('small').getContext('2d');
const c2 = document.getElementById('big').getContext('2d');
(function loop() {
  drawKowtow(c1, f);
  drawKowtow(c2, f);
  f++;
  requestAnimationFrame(loop);
})();
</script>
