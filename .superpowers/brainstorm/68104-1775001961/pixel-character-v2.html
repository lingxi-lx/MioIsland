<h2>CodeIsland - Pixel Character v2</h2>
<p class="subtitle">Less detail, more soul. Minimal pixels, maximum expression.</p>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;">

  <!-- Idle: Sitting, peaceful -->
  <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:12px;color:#555;margin-bottom:16px;font-family:monospace;letter-spacing:2px;">IDLE</div>
    <canvas id="idle" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
    <div style="color:#6b7280;font-size:11px;margin-top:12px;font-style:italic;">sitting quietly, blinking</div>
  </div>

  <!-- Working: Focused, typing fast -->
  <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:12px;color:#555;margin-bottom:16px;font-family:monospace;letter-spacing:2px;">WORKING</div>
    <canvas id="working" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
    <div style="color:#6b7280;font-size:11px;margin-top:12px;font-style:italic;">hunched over, sparks flying</div>
  </div>

  <!-- Waiting: Looking at you -->
  <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:12px;color:#555;margin-bottom:16px;font-family:monospace;letter-spacing:2px;">NEEDS YOU</div>
    <canvas id="waiting" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
    <div style="color:#6b7280;font-size:11px;margin-top:12px;font-style:italic;">looks up, question mark floats</div>
  </div>

  <!-- Compacting: Meditating -->
  <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:12px;color:#555;margin-bottom:16px;font-family:monospace;letter-spacing:2px;">THINKING</div>
    <canvas id="thinking" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
    <div style="color:#6b7280;font-size:11px;margin-top:12px;font-style:italic;">eyes closed, particles orbit</div>
  </div>

  <!-- Error: Fallen over -->
  <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:12px;color:#555;margin-bottom:16px;font-family:monospace;letter-spacing:2px;">ERROR</div>
    <canvas id="error" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
    <div style="color:#6b7280;font-size:11px;margin-top:12px;font-style:italic;">tripped, seeing stars</div>
  </div>

  <!-- Done: Victorious -->
  <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:12px;color:#555;margin-bottom:16px;font-family:monospace;letter-spacing:2px;">DONE</div>
    <canvas id="done" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
    <div style="color:#6b7280;font-size:11px;margin-top:12px;font-style:italic;">plants flag, fireworks</div>
  </div>

</div>

<script>
const P = 5; // pixel size — chunky, deliberate

function drawPixel(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

function drawBody(ctx, x, y, bodyColor, headColor='#FFD93D') {
  // Head — 3x3, round feeling
  drawPixel(ctx, x+1, y, headColor);
  drawPixel(ctx, x, y+1, headColor);
  drawPixel(ctx, x+1, y+1, headColor);
  drawPixel(ctx, x+2, y+1, headColor);
  drawPixel(ctx, x+1, y+2, headColor);
  // Body — 3x2
  drawPixel(ctx, x, y+3, bodyColor);
  drawPixel(ctx, x+1, y+3, bodyColor);
  drawPixel(ctx, x+2, y+3, bodyColor);
  drawPixel(ctx, x, y+4, bodyColor);
  drawPixel(ctx, x+1, y+4, bodyColor);
  drawPixel(ctx, x+2, y+4, bodyColor);
}

function drawEyes(ctx, x, y, color='#1a1a2e', open=true) {
  if (open) {
    drawPixel(ctx, x, y+1, color);
    drawPixel(ctx, x+2, y+1, color);
  } else {
    // Closed — just a line
    drawPixel(ctx, x, y+1, color, 0.5);
    drawPixel(ctx, x+2, y+1, color, 0.5);
  }
}

function drawLegs(ctx, x, y, color, frame=0) {
  // Two legs, can animate walk
  if (frame % 2 === 0) {
    drawPixel(ctx, x, y+5, color);
    drawPixel(ctx, x+2, y+5, color);
  } else {
    drawPixel(ctx, x, y+5, color);
    drawPixel(ctx, x+1, y+5, color);
  }
}

// === IDLE: Sitting peacefully, gentle blink ===
(function() {
  const canvas = document.getElementById('idle');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,80,80);
    const blink = (frame % 60 < 3);
    const bobY = Math.sin(frame * 0.05) * 0.3;
    const baseY = 5 + Math.round(bobY);

    // Ground shadow
    drawPixel(ctx, 5, 11, '#ffffff', 0.05);
    drawPixel(ctx, 6, 11, '#ffffff', 0.08);
    drawPixel(ctx, 7, 11, '#ffffff', 0.05);

    drawBody(ctx, 5, baseY, '#6B8AFF');
    drawEyes(ctx, 5, baseY, '#1a1a2e', !blink);
    // Sitting — no legs, just a base
    drawPixel(ctx, 5, baseY+5, '#6B8AFF');
    drawPixel(ctx, 6, baseY+5, '#6B8AFF');
    drawPixel(ctx, 7, baseY+5, '#6B8AFF');

    // Zzz floating
    if (frame % 80 > 40) {
      const zzAlpha = Math.sin((frame % 80 - 40) * 0.08) * 0.6;
      drawPixel(ctx, 9, baseY - 1 - Math.floor((frame%40)/15), '#6B8AFF', Math.max(0, zzAlpha));
    }

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// === WORKING: Hunched, sparks fly ===
(function() {
  const canvas = document.getElementById('working');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  let sparks = [];
  function draw() {
    ctx.clearRect(0,0,80,80);

    drawBody(ctx, 4, 5, '#4ADE80');
    drawEyes(ctx, 4, 5, '#1a1a2e', true);
    drawLegs(ctx, 4, 5, '#4ADE80', frame);

    // Arms reaching forward (typing)
    const armFrame = frame % 6 < 3;
    drawPixel(ctx, 7, 8, '#FFD93D'); // right arm
    drawPixel(ctx, 8, armFrame ? 8 : 9, '#FFD93D');

    // Laptop / work surface
    drawPixel(ctx, 8, 10, '#374151');
    drawPixel(ctx, 9, 10, '#374151');
    drawPixel(ctx, 10, 10, '#374151');
    // Screen glow
    drawPixel(ctx, 9, 9, '#4ADE80', 0.4 + Math.sin(frame*0.2)*0.2);
    drawPixel(ctx, 10, 9, '#4ADE80', 0.3 + Math.cos(frame*0.3)*0.2);

    // Flying sparks
    if (frame % 4 === 0) {
      sparks.push({
        x: 9 + Math.random()*2,
        y: 8,
        vx: (Math.random()-0.3) * 0.4,
        vy: -Math.random() * 0.5 - 0.2,
        life: 12 + Math.random()*8,
        color: ['#4ADE80','#FFD93D','#60a5fa'][Math.floor(Math.random()*3)]
      });
    }
    sparks.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.life--;
      drawPixel(ctx, Math.round(s.x), Math.round(s.y), s.color, s.life/20);
    });
    sparks = sparks.filter(s => s.life > 0);

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// === WAITING: Looking up, ? floats ===
(function() {
  const canvas = document.getElementById('waiting');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,80,80);
    const bounce = Math.sin(frame * 0.08) * 0.5;
    const baseY = 6;

    drawBody(ctx, 5, baseY, '#F59E0B');
    // Eyes looking up
    drawPixel(ctx, 5, baseY, '#1a1a2e');
    drawPixel(ctx, 7, baseY, '#1a1a2e');
    drawLegs(ctx, 5, baseY, '#F59E0B');

    // One arm raised
    drawPixel(ctx, 8, baseY + 2, '#FFD93D');
    drawPixel(ctx, 8, baseY + 1, '#FFD93D');

    // Floating ? mark
    const qY = 2 + Math.round(Math.sin(frame * 0.06) * 1.5);
    const qAlpha = 0.5 + Math.sin(frame * 0.04) * 0.3;
    drawPixel(ctx, 10, qY, '#F59E0B', qAlpha);
    drawPixel(ctx, 11, qY, '#F59E0B', qAlpha);
    drawPixel(ctx, 11, qY+1, '#F59E0B', qAlpha);
    drawPixel(ctx, 10, qY+1, '#F59E0B', qAlpha * 0.5);
    drawPixel(ctx, 10, qY+2, '#F59E0B', qAlpha);
    drawPixel(ctx, 10, qY+4, '#F59E0B', qAlpha * 0.7); // dot

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// === THINKING: Eyes closed, particles orbit ===
(function() {
  const canvas = document.getElementById('thinking');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,80,80);
    const float = Math.sin(frame * 0.03) * 0.5;
    const baseY = 6 + Math.round(float);

    drawBody(ctx, 5, baseY, '#A78BFA');
    drawEyes(ctx, 5, baseY, '#A78BFA', false); // eyes closed
    drawLegs(ctx, 5, baseY, '#A78BFA');

    // Orbiting particles
    for (let i = 0; i < 3; i++) {
      const angle = (frame * 0.04) + (i * Math.PI * 2 / 3);
      const radius = 3 + Math.sin(frame * 0.02 + i) * 0.5;
      const px = 6 + Math.cos(angle) * radius;
      const py = baseY + 2 + Math.sin(angle) * radius * 0.6;
      const alpha = 0.3 + Math.sin(frame * 0.05 + i * 2) * 0.3;
      drawPixel(ctx, Math.round(px), Math.round(py), '#C4B5FD', alpha);
    }

    // Subtle glow under character
    drawPixel(ctx, 5, baseY+6, '#A78BFA', 0.1 + Math.sin(frame*0.04)*0.05);
    drawPixel(ctx, 6, baseY+6, '#A78BFA', 0.15 + Math.sin(frame*0.04)*0.05);
    drawPixel(ctx, 7, baseY+6, '#A78BFA', 0.1 + Math.sin(frame*0.04)*0.05);

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// === ERROR: Fallen over, stars ===
(function() {
  const canvas = document.getElementById('error');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,80,80);
    const wobble = Math.sin(frame * 0.15) * 0.3;

    // Fallen sideways character
    // Head
    drawPixel(ctx, 3, 8, '#FFD93D');
    drawPixel(ctx, 3, 9, '#FFD93D');
    drawPixel(ctx, 4, 8, '#FFD93D');
    drawPixel(ctx, 4, 9, '#FFD93D');
    drawPixel(ctx, 4, 10, '#FFD93D');
    // X eyes
    drawPixel(ctx, 3, 9, '#EF4444');
    drawPixel(ctx, 4, 9, '#EF4444');
    // Body (horizontal)
    drawPixel(ctx, 5, 8, '#EF4444');
    drawPixel(ctx, 5, 9, '#EF4444');
    drawPixel(ctx, 5, 10, '#EF4444');
    drawPixel(ctx, 6, 8, '#EF4444');
    drawPixel(ctx, 6, 9, '#EF4444');
    drawPixel(ctx, 6, 10, '#EF4444');
    drawPixel(ctx, 7, 9, '#EF4444');
    drawPixel(ctx, 8, 9, '#EF4444');

    // Rotating stars above
    const starColors = ['#FCD34D', '#FBBF24', '#F59E0B'];
    for (let i = 0; i < 3; i++) {
      const a = (frame * 0.06) + (i * Math.PI * 2 / 3);
      const sx = 5 + Math.cos(a) * 2.5;
      const sy = 5 + Math.sin(a) * 1.5;
      drawPixel(ctx, Math.round(sx), Math.round(sy), starColors[i], 0.7);
    }

    // Ground
    for (let x = 2; x <= 9; x++) {
      drawPixel(ctx, x, 11, '#ffffff', 0.04);
    }

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

// === DONE: Plants flag, fireworks ===
(function() {
  const canvas = document.getElementById('done');
  const ctx = canvas.getContext('2d');
  let frame = 0;
  let fireworks = [];
  function draw() {
    ctx.clearRect(0,0,80,80);
    const jump = frame < 30 ? Math.abs(Math.sin(frame * 0.15)) * 2 : 0;
    const baseY = 6 - Math.round(jump);

    drawBody(ctx, 5, baseY, '#4ADE80');
    // Happy eyes — arcs
    drawPixel(ctx, 5, baseY+1, '#1a1a2e');
    drawPixel(ctx, 7, baseY+1, '#1a1a2e');
    // Smile
    drawPixel(ctx, 6, baseY+2, '#1a1a2e', 0.5);
    drawLegs(ctx, 5, baseY, '#4ADE80');

    // Flag pole
    drawPixel(ctx, 10, baseY+1, '#888');
    drawPixel(ctx, 10, baseY+2, '#888');
    drawPixel(ctx, 10, baseY+3, '#888');
    drawPixel(ctx, 10, baseY+4, '#888');
    drawPixel(ctx, 10, baseY+5, '#888');
    // Flag
    drawPixel(ctx, 11, baseY+1, '#4ADE80');
    drawPixel(ctx, 12, baseY+1, '#4ADE80');
    drawPixel(ctx, 11, baseY+2, '#4ADE80');
    drawPixel(ctx, 12, baseY+2, '#4ADE80');
    // Flag wave
    if (frame % 20 > 10) {
      drawPixel(ctx, 13, baseY+1, '#4ADE80', 0.5);
    }

    // Firework particles
    if (frame % 15 === 0 && fireworks.length < 20) {
      const ox = 2 + Math.random() * 12;
      const oy = 1 + Math.random() * 3;
      const c = ['#4ADE80','#FFD93D','#60A5FA','#F472B6','#A78BFA'][Math.floor(Math.random()*5)];
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.5;
        fireworks.push({
          x: ox, y: oy,
          vx: Math.cos(angle) * 0.3,
          vy: Math.sin(angle) * 0.3,
          life: 15 + Math.random()*10,
          color: c
        });
      }
    }
    fireworks.forEach(f => {
      f.x += f.vx; f.y += f.vy; f.vy += 0.01; f.life--;
      drawPixel(ctx, Math.round(f.x), Math.round(f.y), f.color, f.life/25);
    });
    fireworks = fireworks.filter(f => f.life > 0);

    frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
