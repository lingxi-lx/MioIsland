<h2>CodeIsland - Pixel Character v4</h2>
<p class="subtitle">Meaningful color. Symbol clarity. Life in motion.</p>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;">

  <!-- IDLE: napping at desk -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">IDLE</div>
    <canvas id="idle" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- WORKING -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">WORKING</div>
    <canvas id="working" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- NEEDS YOU: pulsing beacon -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">NEEDS YOU</div>
    <canvas id="waiting" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- THINKING -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">THINKING</div>
    <canvas id="thinking" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- ERROR: red X -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">ERROR</div>
    <canvas id="error" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

  <!-- DONE: green check -->
  <div style="background:#0d0d0d;border-radius:12px;padding:24px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:16px;font-family:monospace;letter-spacing:3px;">DONE</div>
    <canvas id="done" width="80" height="80" style="image-rendering:pixelated;width:80px;height:80px;"></canvas>
  </div>

</div>

<script>
const P = 5;

function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

// === IDLE: napping on desk, feet dangle, Zzz float up ===
(function(){
  const c = document.getElementById('idle').getContext('2d');
  let f=0;
  const BLUE = '#6B8AFF';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Desk surface
    for(let i=2;i<=12;i++) px(c, i, 10, '#222', 0.6);

    // Body slumped on desk — head resting on arms
    // Arms on desk
    px(c, 5, 9, '#ddd');
    px(c, 6, 9, '#ddd');
    px(c, 7, 9, '#ddd');
    px(c, 8, 9, '#ddd');
    // Head resting sideways on arms
    px(c, 5, 8, '#fff');
    px(c, 6, 7, '#fff');
    px(c, 6, 8, '#fff');
    px(c, 7, 8, '#fff');
    // Closed eyes
    px(c, 5, 8, BLUE, 0.3);
    // Body behind desk
    px(c, 6, 10, '#ddd');
    px(c, 7, 10, '#ddd');
    px(c, 8, 10, '#ddd');

    // Dangling feet — gentle swing
    const swing = Math.sin(f * 0.04) * 0.8;
    px(c, 6, 11, '#ddd');
    px(c, 8, 11, '#ddd');
    px(c, 6 + Math.round(swing * 0.3), 12, '#ddd', 0.8);
    px(c, 8 - Math.round(swing * 0.3), 12, '#ddd', 0.8);

    // Zzz bubbles floating up — soft blue
    const zzCycle = f % 120;
    if (zzCycle < 80) {
      const zy = 6 - Math.floor(zzCycle / 16);
      const za = Math.max(0, 0.6 - zzCycle * 0.008);
      // Small z
      px(c, 10, zy, BLUE, za * 0.5);
      if (zzCycle > 25) {
        px(c, 11, zy - 2, BLUE, za * 0.7);
        px(c, 12, zy - 2, BLUE, za * 0.4);
      }
      if (zzCycle > 50) {
        px(c, 12, zy - 4, BLUE, za * 0.9);
        px(c, 13, zy - 4, BLUE, za * 0.6);
        px(c, 13, zy - 5, BLUE, za * 0.3);
      }
    }

    f++; requestAnimationFrame(draw);
  })();
})();

// === WORKING: typing, cyan sparks from screen ===
(function(){
  const c = document.getElementById('working').getContext('2d');
  let f=0, sparks=[];
  const CYAN = '#67E8F9';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Character sitting upright
    // Head
    px(c, 5, 4, '#fff');
    px(c, 4, 5, '#fff');
    px(c, 5, 5, '#fff');
    px(c, 6, 5, '#fff');
    px(c, 5, 6, '#fff');
    // Eyes — focused
    px(c, 4, 5, '#0d0d0d');
    px(c, 6, 5, '#0d0d0d');
    // Body
    px(c, 4, 7, '#ddd');
    px(c, 5, 7, '#ddd');
    px(c, 6, 7, '#ddd');
    px(c, 4, 8, '#ddd');
    px(c, 5, 8, '#ddd');
    px(c, 6, 8, '#ddd');
    // Legs
    px(c, 4, 9, '#ddd');
    px(c, 6, 9, '#ddd');

    // Arms typing
    const armF = f % 6 < 3;
    px(c, 7, 7, '#fff');
    px(c, 8, armF ? 7 : 8, '#fff');

    // Screen — subtle cyan glow
    const glow = 0.12 + Math.sin(f * 0.15) * 0.06;
    px(c, 9, 5, CYAN, glow);
    px(c, 10, 5, CYAN, glow * 0.8);
    px(c, 11, 5, CYAN, glow * 0.6);
    px(c, 9, 6, CYAN, glow * 0.9);
    px(c, 10, 6, CYAN, glow * 0.7);
    px(c, 11, 6, CYAN, glow * 0.5);
    px(c, 9, 7, CYAN, glow * 0.7);
    px(c, 10, 7, CYAN, glow * 0.5);
    // Screen frame
    px(c, 9, 8, '#333');
    px(c, 10, 8, '#333');
    px(c, 11, 8, '#333');

    // Sparks — cyan only, from screen
    if (f % 4 === 0) sparks.push({
      x: 10 + Math.random(), y: 5 + Math.random() * 2,
      vx: (Math.random() - 0.2) * 0.5, vy: -Math.random() * 0.5 - 0.15,
      life: 8 + Math.random() * 8
    });
    sparks.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.life--;
      px(c, Math.round(s.x), Math.round(s.y), CYAN, s.life / 16);
    });
    sparks = sparks.filter(s => s.life > 0);

    f++; requestAnimationFrame(draw);
  })();
})();

// === NEEDS YOU: character pulses like heartbeat, amber ring expands ===
(function(){
  const c = document.getElementById('waiting').getContext('2d');
  let f=0;
  const AMBER = '#F59E0B';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Pulsing ring — heartbeat rhythm
    const beat = Math.pow(Math.sin(f * 0.06), 2);
    const ringR = 3 + beat * 2;
    const ringAlpha = 0.15 + beat * 0.2;
    // Draw ring as pixels in a circle
    for (let a = 0; a < Math.PI * 2; a += 0.3) {
      const rx = 7 + Math.cos(a) * ringR;
      const ry = 7 + Math.sin(a) * ringR;
      px(c, Math.round(rx), Math.round(ry), AMBER, ringAlpha);
    }
    // Inner glow
    const innerAlpha = 0.03 + beat * 0.06;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        if (dx*dx + dy*dy <= 4) {
          px(c, 7+dx, 7+dy, AMBER, innerAlpha);
        }
      }
    }

    // Character in center — scales with pulse
    const s = 1 + beat * 0.08;
    const charAlpha = 0.7 + beat * 0.3;
    // Head
    px(c, 7, 5, '#fff', charAlpha);
    px(c, 6, 6, '#fff', charAlpha);
    px(c, 7, 6, '#fff', charAlpha);
    px(c, 8, 6, '#fff', charAlpha);
    px(c, 7, 7, '#fff', charAlpha);
    // Eyes — wide open, looking at you
    px(c, 6, 6, AMBER, charAlpha * 0.8);
    px(c, 8, 6, AMBER, charAlpha * 0.8);
    // Body
    px(c, 6, 8, '#fff', charAlpha * 0.8);
    px(c, 7, 8, '#fff', charAlpha * 0.8);
    px(c, 8, 8, '#fff', charAlpha * 0.8);
    px(c, 6, 9, '#fff', charAlpha * 0.7);
    px(c, 7, 9, '#fff', charAlpha * 0.7);
    px(c, 8, 9, '#fff', charAlpha * 0.7);
    // Legs
    px(c, 6, 10, '#fff', charAlpha * 0.6);
    px(c, 8, 10, '#fff', charAlpha * 0.6);

    f++; requestAnimationFrame(draw);
  })();
})();

// === THINKING: same as v3, refined ===
(function(){
  const c = document.getElementById('thinking').getContext('2d');
  let f=0;
  const PURPLE = '#A78BFA';
  (function draw(){
    c.clearRect(0,0,80,80);
    const bob = Math.sin(f*0.025)*0.5;
    const by = 6+Math.round(bob);

    // Body — slightly transparent, meditative
    px(c, 7, by, '#fff', 0.5);
    px(c, 6, by+1, '#fff', 0.5);
    px(c, 7, by+1, '#fff', 0.5);
    px(c, 8, by+1, '#fff', 0.5);
    px(c, 7, by+2, '#fff', 0.5);
    px(c, 6, by+3, '#fff', 0.4);
    px(c, 7, by+3, '#fff', 0.4);
    px(c, 8, by+3, '#fff', 0.4);
    px(c, 6, by+4, '#fff', 0.4);
    px(c, 7, by+4, '#fff', 0.4);
    px(c, 8, by+4, '#fff', 0.4);
    px(c, 6, by+5, '#fff', 0.3);
    px(c, 8, by+5, '#fff', 0.3);
    // Eyes closed
    px(c, 6, by+1, PURPLE, 0.3);
    px(c, 8, by+1, PURPLE, 0.3);

    // Orbiting particles — purple
    for(let i=0;i<3;i++){
      const angle = f*0.025 + i*Math.PI*2/3;
      const r = 3.5 + Math.sin(f*0.012+i)*0.6;
      const ox = 7 + Math.cos(angle)*r;
      const oy = by+2 + Math.sin(angle)*r*0.5;
      const pa = 0.25 + Math.sin(f*0.03+i*2)*0.2;
      px(c, Math.round(ox), Math.round(oy), PURPLE, pa);
    }

    f++; requestAnimationFrame(draw);
  })();
})();

// === ERROR: clean red X with fading glow ===
(function(){
  const c = document.getElementById('error').getContext('2d');
  let f=0;
  const RED = '#EF4444';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Pulsing glow behind X
    const pulse = 0.04 + Math.sin(f * 0.05) * 0.03;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 3) {
          px(c, 7+dx, 7+dy, RED, pulse * (1 - dist/3));
        }
      }
    }

    // X mark — crisp
    const xa = 0.7 + Math.sin(f * 0.04) * 0.15;
    // top-left to bottom-right
    px(c, 5, 5, RED, xa);
    px(c, 6, 6, RED, xa);
    px(c, 7, 7, RED, xa);
    px(c, 8, 8, RED, xa);
    px(c, 9, 9, RED, xa);
    // top-right to bottom-left
    px(c, 9, 5, RED, xa);
    px(c, 8, 6, RED, xa);
    px(c, 7, 7, RED, xa);
    px(c, 6, 8, RED, xa);
    px(c, 5, 9, RED, xa);

    f++; requestAnimationFrame(draw);
  })();
})();

// === DONE: green checkmark with rising particles ===
(function(){
  const c = document.getElementById('done').getContext('2d');
  let f=0, particles=[];
  const GREEN = '#4ADE80';
  (function draw(){
    c.clearRect(0,0,80,80);

    // Soft glow behind check
    const glow = 0.03 + Math.sin(f * 0.04) * 0.02;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 3.5) {
          px(c, 7+dx, 7+dy, GREEN, glow * (1 - dist/4));
        }
      }
    }

    // Checkmark — crisp
    const ca = 0.7 + Math.sin(f * 0.03) * 0.15;
    // Short arm
    px(c, 4, 7, GREEN, ca * 0.7);
    px(c, 5, 8, GREEN, ca);
    px(c, 6, 9, GREEN, ca);
    // Long arm
    px(c, 7, 8, GREEN, ca);
    px(c, 8, 7, GREEN, ca);
    px(c, 9, 6, GREEN, ca);
    px(c, 10, 5, GREEN, ca * 0.9);

    // Rising particles — green, float up and fade
    if (f % 10 === 0 && particles.length < 12) {
      particles.push({
        x: 5 + Math.random() * 6,
        y: 10 + Math.random() * 2,
        vy: -0.12 - Math.random() * 0.1,
        life: 20 + Math.random() * 15
      });
    }
    particles.forEach(p => {
      p.y += p.vy; p.life--;
      px(c, Math.round(p.x), Math.round(p.y), GREEN, p.life / 35);
    });
    particles = particles.filter(p => p.life > 0);

    f++; requestAnimationFrame(draw);
  })();
})();
</script>
