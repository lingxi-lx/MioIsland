<h2>CodeIsland - All 6 States Final</h2>
<p class="subtitle">Confirm all animations together</p>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;">

  <div style="background:#0d0d0d;border-radius:12px;padding:20px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:12px;font-family:monospace;letter-spacing:3px;">IDLE</div>
    <canvas id="idle" width="50" height="50" style="image-rendering:pixelated;width:120px;height:120px;"></canvas>
  </div>

  <div style="background:#0d0d0d;border-radius:12px;padding:20px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:12px;font-family:monospace;letter-spacing:3px;">WORKING</div>
    <canvas id="working" width="50" height="50" style="image-rendering:pixelated;width:120px;height:120px;"></canvas>
  </div>

  <div style="background:#0d0d0d;border-radius:12px;padding:20px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:12px;font-family:monospace;letter-spacing:3px;">NEEDS YOU</div>
    <canvas id="waiting" width="50" height="50" style="image-rendering:pixelated;width:120px;height:120px;"></canvas>
  </div>

  <div style="background:#0d0d0d;border-radius:12px;padding:20px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:12px;font-family:monospace;letter-spacing:3px;">THINKING</div>
    <canvas id="thinking" width="50" height="50" style="image-rendering:pixelated;width:120px;height:120px;"></canvas>
  </div>

  <div style="background:#0d0d0d;border-radius:12px;padding:20px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:12px;font-family:monospace;letter-spacing:3px;">ERROR</div>
    <canvas id="error" width="50" height="50" style="image-rendering:pixelated;width:120px;height:120px;"></canvas>
  </div>

  <div style="background:#0d0d0d;border-radius:12px;padding:20px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:12px;font-family:monospace;letter-spacing:3px;">DONE</div>
    <canvas id="done" width="50" height="50" style="image-rendering:pixelated;width:120px;height:120px;"></canvas>
  </div>

</div>

<script>
const P = 5;
function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

const SKIN = '#FFCB8E';
const SKIN_S = '#E8A86A';
const HAIR = '#5B3A29';
const AMBER = '#F59E0B';
const AMBER_L = '#FCD34D';
const VEST = '#D97706';
const VEST_D = '#B45309';
const CYAN = '#67E8F9';
const HOODIE = '#3A9A5B';
const HOODIE_D = '#2D7A48';
const PURPLE = '#A78BFA';
const PURPLE_D = '#7C5FC4';
const PURPLE_L = '#C4B5FD';
const RED = '#EF4444';
const RED_D = '#B91C1C';
const RED_L = '#FCA5A5';
const GREEN = '#4ADE80';
const GREEN_D = '#22C55E';
const GREEN_L = '#86EFAC';
const BLUE = '#5B7FBF';
const BLUE_D = '#4A6A9F';
const ZZZ = '#7BA4E0';

// === IDLE: napping at desk ===
(function(){
  const c = document.getElementById('idle').getContext('2d');
  let f=0;
  (function draw(){
    c.clearRect(0,0,50,50);
    // Desk
    for(let i=1;i<=8;i++) px(c, i, 8, '#4A3728', 0.6);
    // Arms on desk
    px(c, 3, 7, SKIN_S); px(c, 4, 7, SKIN); px(c, 5, 7, SKIN); px(c, 6, 7, SKIN_S);
    // Head resting
    px(c, 3, 5, HAIR); px(c, 4, 5, HAIR); px(c, 5, 5, HAIR);
    px(c, 3, 6, SKIN); px(c, 4, 6, SKIN); px(c, 5, 6, SKIN_S);
    // Closed eyes
    px(c, 3, 6, BLUE, 0.3);
    // Body behind desk
    px(c, 4, 8, BLUE); px(c, 5, 8, BLUE_D);
    // Feet dangling
    const swing = Math.sin(f*0.04);
    px(c, 4, 9, BLUE_D); px(c, 6, 9, BLUE_D);
    px(c, 4+Math.round(swing*0.4), 9, '#6B4226', 0.6);
    // Zzz
    const cycle = f%100;
    if(cycle<70){
      const a1 = Math.max(0, 0.7-cycle*0.01);
      px(c, 7, 5-Math.floor(cycle/20), ZZZ, a1*0.5);
      if(cycle>25){
        const a2 = Math.max(0, 0.7-(cycle-25)*0.013);
        px(c, 8, 4-Math.floor((cycle-25)/22), ZZZ, a2*0.7);
      }
    }
    f++; requestAnimationFrame(draw);
  })();
})();

// === WORKING: typing at laptop ===
(function(){
  const c = document.getElementById('working').getContext('2d');
  let f=0, sparks=[];
  (function draw(){
    c.clearRect(0,0,50,50);
    // Head
    px(c, 2, 2, HAIR); px(c, 3, 2, HAIR); px(c, 4, 2, HAIR);
    px(c, 2, 3, SKIN); px(c, 3, 3, SKIN); px(c, 4, 3, SKIN);
    px(c, 2, 4, SKIN_S); px(c, 3, 4, SKIN); px(c, 4, 4, SKIN_S);
    px(c, 2, 3, '#2D1B0E'); px(c, 4, 3, '#2D1B0E');
    // Body
    px(c, 2, 5, HOODIE); px(c, 3, 5, HOODIE_D); px(c, 4, 5, HOODIE);
    px(c, 2, 6, HOODIE_D); px(c, 3, 6, HOODIE); px(c, 4, 6, HOODIE_D);
    // Legs
    px(c, 2, 7, '#3B5998'); px(c, 4, 7, '#3B5998');
    // Arms typing
    const armF = f%6<3;
    px(c, 5, 5, SKIN); px(c, 6, armF?5:6, SKIN_S);
    // Screen
    const fl = 0.3+Math.sin(f*0.15)*0.12;
    px(c, 6, 3, '#1A3A4A'); px(c, 7, 3, '#1A3A4A'); px(c, 8, 3, '#1A3A4A');
    px(c, 6, 4, '#1A3A4A'); px(c, 7, 4, '#1A3A4A'); px(c, 8, 4, '#1A3A4A');
    px(c, 6, 3, CYAN, fl*0.5); px(c, 7, 3, CYAN, fl*0.3);
    px(c, 6, 4, CYAN, fl*0.6); px(c, 7, 4, CYAN, fl*0.4); px(c, 8, 4, CYAN, fl*0.2);
    // Laptop base
    px(c, 5, 6, '#555'); px(c, 6, 6, '#555'); px(c, 7, 6, '#555'); px(c, 8, 6, '#555');
    // Sparks
    if(f%5===0) sparks.push({
      x:7+Math.random(), y:2+Math.random()*2,
      vx:(Math.random()-0.2)*0.4, vy:-Math.random()*0.35-0.1,
      life:8+Math.random()*6
    });
    sparks.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy; s.life--;
      px(c, Math.round(s.x), Math.round(s.y), CYAN, s.life/14);
    });
    sparks=sparks.filter(s=>s.life>0);
    f++; requestAnimationFrame(draw);
  })();
})();

// === NEEDS YOU: standing, hand wave ===
(function(){
  const c = document.getElementById('waiting').getContext('2d');
  let f=0;
  (function draw(){
    c.clearRect(0,0,50,50);
    const frame = Math.floor(f/12)%2;
    // Head
    px(c, 3, 3, HAIR); px(c, 4, 3, HAIR); px(c, 5, 3, HAIR);
    px(c, 3, 4, SKIN); px(c, 4, 4, SKIN); px(c, 5, 4, SKIN);
    px(c, 3, 5, SKIN_S); px(c, 4, 5, SKIN); px(c, 5, 5, SKIN_S);
    px(c, 3, 4, '#2D1B0E'); px(c, 5, 4, '#2D1B0E');
    // Body
    px(c, 3, 6, VEST); px(c, 4, 6, VEST_D); px(c, 5, 6, VEST);
    px(c, 3, 7, VEST_D); px(c, 4, 7, VEST); px(c, 5, 7, VEST_D);
    // Legs
    px(c, 3, 8, '#3B5998'); px(c, 5, 8, '#3B5998');
    // Left arm down
    px(c, 2, 6, SKIN_S);
    // Right arm raised, hand waves
    px(c, 6, 5, SKIN);
    px(c, 6, 4, SKIN);
    if(frame===0) { px(c, 5, 3, SKIN); } else { px(c, 7, 3, SKIN); }
    f++; requestAnimationFrame(draw);
  })();
})();

// === THINKING: meditating, purple orbs ===
(function(){
  const c = document.getElementById('thinking').getContext('2d');
  let f=0;
  (function draw(){
    c.clearRect(0,0,50,50);
    const bob = Math.sin(f*0.025)*0.4;
    const by = 4+Math.round(bob);
    // Head
    px(c, 4, by, HAIR, 0.7); px(c, 5, by, HAIR, 0.7); px(c, 6, by, HAIR, 0.7);
    px(c, 4, by+1, SKIN, 0.7); px(c, 5, by+1, SKIN, 0.7); px(c, 6, by+1, SKIN, 0.7);
    px(c, 4, by+2, SKIN_S, 0.6); px(c, 5, by+2, SKIN, 0.6); px(c, 6, by+2, SKIN_S, 0.6);
    // Closed eyes
    px(c, 4, by+1, PURPLE, 0.3); px(c, 6, by+1, PURPLE, 0.3);
    // Robe
    px(c, 3, by+3, PURPLE_D, 0.6); px(c, 4, by+3, PURPLE, 0.6); px(c, 5, by+3, PURPLE_D, 0.6);
    px(c, 3, by+4, PURPLE, 0.5); px(c, 4, by+4, PURPLE_D, 0.5); px(c, 5, by+4, PURPLE, 0.5); px(c, 6, by+4, PURPLE_D, 0.4);
    // Cross legs
    px(c, 3, by+5, PURPLE_D, 0.4); px(c, 4, by+5, PURPLE, 0.35);
    px(c, 5, by+5, PURPLE, 0.35); px(c, 6, by+5, PURPLE_D, 0.4);
    // Hands
    px(c, 3, by+4, SKIN, 0.4); px(c, 6, by+4, SKIN_S, 0.4);
    // Orbiting particles
    for(let i=0;i<3;i++){
      const angle = f*0.025+i*Math.PI*2/3;
      const r = 3+Math.sin(f*0.012+i)*0.5;
      const ox = 5+Math.cos(angle)*r;
      const oy = by+2+Math.sin(angle)*r*0.5;
      px(c, Math.round(ox), Math.round(oy), PURPLE_L, 0.3+Math.sin(f*0.03+i*2)*0.2);
    }
    f++; requestAnimationFrame(draw);
  })();
})();

// === ERROR: red X with glow ===
(function(){
  const c = document.getElementById('error').getContext('2d');
  let f=0;
  (function draw(){
    c.clearRect(0,0,50,50);
    const pulse = 0.06+Math.sin(f*0.05)*0.03;
    for(let dy=-3;dy<=3;dy++) for(let dx=-3;dx<=3;dx++){
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<4) px(c, 5+dx, 5+dy, RED_D, pulse*(1-dist/4));
    }
    const xa = 0.75+Math.sin(f*0.04)*0.15;
    px(c, 3, 3, RED, xa); px(c, 4, 4, RED_L, xa);
    px(c, 5, 5, RED, xa);
    px(c, 6, 6, RED_L, xa); px(c, 7, 7, RED, xa);
    px(c, 7, 3, RED, xa); px(c, 6, 4, RED_L, xa);
    px(c, 4, 6, RED_L, xa); px(c, 3, 7, RED, xa);
    f++; requestAnimationFrame(draw);
  })();
})();

// === DONE: green check with particles ===
(function(){
  const c = document.getElementById('done').getContext('2d');
  let f=0, particles=[];
  (function draw(){
    c.clearRect(0,0,50,50);
    const glow = 0.04+Math.sin(f*0.04)*0.02;
    for(let dy=-3;dy<=3;dy++) for(let dx=-3;dx<=3;dx++){
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<4) px(c, 5+dx, 5+dy, GREEN_D, glow*(1-dist/4.5));
    }
    const ca = 0.75+Math.sin(f*0.03)*0.15;
    px(c, 2, 5, GREEN_D, ca*0.6);
    px(c, 3, 6, GREEN, ca*0.8);
    px(c, 4, 7, GREEN_L, ca);
    px(c, 5, 6, GREEN, ca);
    px(c, 6, 5, GREEN_L, ca);
    px(c, 7, 4, GREEN, ca*0.9);
    px(c, 8, 3, GREEN_D, ca*0.8);
    if(f%8===0&&particles.length<15){
      particles.push({
        x:2+Math.random()*7, y:8+Math.random()*1,
        vy:-0.1-Math.random()*0.1, life:20+Math.random()*15,
        color:[GREEN,GREEN_L,GREEN_D][Math.floor(Math.random()*3)]
      });
    }
    particles.forEach(p=>{
      p.y+=p.vy; p.life--;
      px(c, Math.round(p.x), Math.round(p.y), p.color, p.life/35);
    });
    particles=particles.filter(p=>p.life>0);
    f++; requestAnimationFrame(draw);
  })();
})();
</script>
