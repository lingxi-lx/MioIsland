<h2>NEEDS YOU — Side View Kowtow</h2>
<p class="subtitle">Kneeling, bowing head to ground, repeating</p>

<div style="display:flex;justify-content:center;margin:40px 0;">
  <div style="background:#0d0d0d;border-radius:12px;padding:40px 60px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:20px;font-family:monospace;letter-spacing:3px;">NEEDS YOU</div>
    <canvas id="waiting" width="80" height="80" style="image-rendering:pixelated;width:160px;height:160px;"></canvas>
  </div>
</div>

<script>
const P = 5;
function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

const SKIN = '#FFCB8E';
const SKIN_S = '#E8A86A';
const HAIR = '#5B3A29';
const AMBER = '#F59E0B';
const AMBER_L = '#FCD34D';
const VEST = '#D97706';
const VEST_D = '#B45309';

(function(){
  const c = document.getElementById('waiting').getContext('2d');
  let f = 0;
  let impacts = [];

  // Kowtow cycle: 0-30 upright, 30-50 bowing down, 50-65 head on ground, 65-85 rising back up, 85-100 pause upright
  function getPhase(frame) {
    const cycle = frame % 100;
    if (cycle < 30) return { state: 'upright', t: cycle / 30 };
    if (cycle < 50) return { state: 'bowing', t: (cycle - 30) / 20 };
    if (cycle < 65) return { state: 'ground', t: (cycle - 50) / 15 };
    if (cycle < 85) return { state: 'rising', t: (cycle - 65) / 20 };
    return { state: 'upright', t: (cycle - 85) / 15 };
  }

  (function draw(){
    c.clearRect(0, 0, 80, 80);
    const phase = getPhase(f);
    const ground = 11;

    // Ground line
    for (let i = 2; i <= 13; i++) px(c, i, ground, '#1a1a1a', 0.4);

    if (phase.state === 'upright') {
      // Kneeling upright, side view facing left
      // Head
      px(c, 4, 5, HAIR); px(c, 5, 5, HAIR);
      px(c, 4, 6, SKIN); px(c, 5, 6, SKIN);
      px(c, 4, 7, SKIN_S); px(c, 5, 7, SKIN);
      // Eye
      px(c, 4, 6, '#2D1B0E');
      // Body
      px(c, 5, 8, VEST); px(c, 6, 8, VEST_D);
      px(c, 5, 9, VEST_D); px(c, 6, 9, VEST);
      // Arms forward (hands together)
      px(c, 3, 8, SKIN); px(c, 4, 8, SKIN_S);
      // Knees on ground
      px(c, 6, 10, '#3B5998'); px(c, 7, 10, '#3B5998');
      px(c, 8, 10, '#3B5998');
      // Feet behind
      px(c, 8, 10, '#6B4226', 0.6); px(c, 9, 10, '#6B4226', 0.5);

    } else if (phase.state === 'bowing') {
      const t = phase.t; // 0→1 going down
      const headY = 5 + Math.round(t * 4);
      const headX = 4 - Math.round(t * 1);
      const bodyTilt = Math.round(t * 2);

      // Head going down
      px(c, headX, headY, HAIR); px(c, headX+1, headY, HAIR);
      px(c, headX, headY+1, SKIN); px(c, headX+1, headY+1, SKIN);
      px(c, headX, headY+1, '#2D1B0E'); // eye closing
      // Body tilting forward
      px(c, 5, 8+bodyTilt, VEST); px(c, 6, 8, VEST_D);
      px(c, 5-Math.round(t), 9, VEST_D); px(c, 6, 9, VEST);
      // Arms reaching to ground
      px(c, headX-1, headY+1, SKIN); px(c, headX, headY+1, SKIN_S);
      // Knees stay
      px(c, 6, 10, '#3B5998'); px(c, 7, 10, '#3B5998'); px(c, 8, 10, '#3B5998');
      px(c, 9, 10, '#6B4226', 0.5);

    } else if (phase.state === 'ground') {
      // Head on ground, full bow — side view
      // Butt up, head down
      // Head flat on ground
      px(c, 2, 10, HAIR); px(c, 3, 10, HAIR);
      px(c, 2, 9, SKIN, 0.8); px(c, 3, 9, SKIN);
      // Eyes shut
      px(c, 2, 9, SKIN_S, 0.4);
      // Arms stretched forward on ground
      px(c, 1, 10, SKIN); px(c, 0, 10, SKIN_S, 0.7);
      // Back arched up
      px(c, 4, 9, VEST); px(c, 5, 8, VEST_D);
      px(c, 4, 8, VEST); px(c, 5, 7, VEST_D);
      px(c, 6, 7, VEST);
      // Butt / hips up
      px(c, 6, 8, VEST_D); px(c, 7, 8, VEST);
      // Knees
      px(c, 7, 9, '#3B5998'); px(c, 7, 10, '#3B5998');
      px(c, 8, 10, '#3B5998');
      // Feet
      px(c, 9, 10, '#6B4226', 0.5); px(c, 9, 9, '#6B4226', 0.4);

      // Impact effect on first frame of ground
      if (phase.t < 0.15) {
        impacts.push({x:1, y:10, life:10});
        impacts.push({x:3, y:10, life:10});
      }

      // Sweat drops
      if (f % 12 === 0) {
        impacts.push({x:3+Math.random(), y:8, life:12, type:'sweat'});
      }

    } else if (phase.state === 'rising') {
      const t = 1 - phase.t; // 1→0 going back up
      const headY = 5 + Math.round(t * 4);
      const headX = 4 - Math.round(t * 1);
      const bodyTilt = Math.round(t * 2);

      // Head rising
      px(c, headX, headY, HAIR); px(c, headX+1, headY, HAIR);
      px(c, headX, headY+1, SKIN); px(c, headX+1, headY+1, SKIN);
      px(c, headX, headY+1, '#2D1B0E');
      // Body
      px(c, 5, 8+bodyTilt, VEST); px(c, 6, 8, VEST_D);
      px(c, 5, 9, VEST_D); px(c, 6, 9, VEST);
      // Arms
      px(c, headX-1, headY+1, SKIN); px(c, headX, headY+1, SKIN_S);
      // Knees
      px(c, 6, 10, '#3B5998'); px(c, 7, 10, '#3B5998'); px(c, 8, 10, '#3B5998');
      px(c, 9, 10, '#6B4226', 0.5);
    }

    // Impact / sweat particles
    impacts.forEach(imp => {
      imp.life--;
      if (imp.type === 'sweat') {
        imp.y -= 0.15;
        px(c, Math.round(imp.x), Math.round(imp.y), AMBER_L, imp.life/14);
      } else {
        const spread = (10 - imp.life) * 0.3;
        px(c, Math.round(imp.x - spread), ground, AMBER, imp.life/12 * 0.4);
        px(c, Math.round(imp.x + spread), ground, AMBER, imp.life/12 * 0.4);
      }
    });
    impacts = impacts.filter(i => i.life > 0);

    // Amber glow beneath — pulsing plea
    const glowPulse = 0.03 + Math.sin(f*0.05)*0.02;
    for (let dx = -1; dx <= 5; dx++) {
      px(c, 4+dx, ground+1, AMBER, glowPulse * (1 - Math.abs(dx-2)*0.15));
    }

    f++;
    requestAnimationFrame(draw);
  })();
})();
</script>
