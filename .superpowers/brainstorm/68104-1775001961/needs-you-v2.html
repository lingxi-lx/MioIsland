<h2>NEEDS YOU — Kneeling & Begging</h2>
<p class="subtitle">Single state redesign</p>

<div style="display:flex;justify-content:center;margin:40px 0;">
  <div style="background:#0d0d0d;border-radius:12px;padding:40px 60px;text-align:center;">
    <div style="font-size:10px;color:#333;margin-bottom:20px;font-family:monospace;letter-spacing:3px;">NEEDS YOU</div>
    <canvas id="waiting" width="80" height="80" style="image-rendering:pixelated;width:160px;height:160px;"></canvas>
  </div>
</div>

<script>
const P = 5;
function px(ctx, x, y, color, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x*P, y*P, P, P);
  ctx.globalAlpha = 1;
}

const SKIN = '#FFCB8E';
const SKIN_S = '#E8A86A';
const HAIR = '#5B3A29';
const AMBER = '#F59E0B';
const AMBER_L = '#FCD34D';
const VEST = '#D97706';
const VEST_D = '#B45309';

(function(){
  const c = document.getElementById('waiting').getContext('2d');
  let f=0;
  let tears=[];
  (function draw(){
    c.clearRect(0,0,80,80);

    const bob = Math.sin(f*0.08)*0.4;
    const by = 4 + Math.round(bob);

    // === Kneeling body ===

    // Hair
    px(c, 6, by, HAIR); px(c, 7, by, HAIR); px(c, 8, by, HAIR);
    // Face
    px(c, 6, by+1, SKIN); px(c, 7, by+1, SKIN); px(c, 8, by+1, SKIN);
    px(c, 6, by+2, SKIN_S); px(c, 7, by+2, SKIN); px(c, 8, by+2, SKIN_S);
    // Eyes — puppy eyes, big and round
    px(c, 6, by+1, '#2D1B0E');
    px(c, 8, by+1, '#2D1B0E');
    // Eyebrow — worried, slanted up
    px(c, 6, by, SKIN_S, 0.6);
    px(c, 8, by, SKIN_S, 0.6);
    // Mouth — wobbly
    const mouthWobble = f % 40 < 20;
    px(c, 7, by+2, mouthWobble ? SKIN_S : '#C08050', 0.7);

    // Body — kneeling, torso upright
    px(c, 6, by+3, VEST); px(c, 7, by+3, VEST_D); px(c, 8, by+3, VEST);
    px(c, 6, by+4, VEST_D); px(c, 7, by+4, VEST); px(c, 8, by+4, VEST_D);

    // Knees on ground — folded legs
    px(c, 5, by+5, '#3B5998'); px(c, 6, by+5, '#3B5998');
    px(c, 7, by+5, '#3B5998');
    px(c, 8, by+5, '#3B5998'); px(c, 9, by+5, '#3B5998');
    // Feet tucked
    px(c, 5, by+6, '#6B4226', 0.5);
    px(c, 9, by+6, '#6B4226', 0.5);

    // === Hands clasped together, begging ===
    const handBob = Math.sin(f * 0.1) * 0.5;
    const hx = 7;
    const hy = by + 2 + Math.round(handBob);
    // Two hands pressed together
    px(c, hx-2, hy, SKIN);
    px(c, hx-1, hy, SKIN);
    px(c, hx-2, hy+1, SKIN_S);
    px(c, hx-1, hy+1, SKIN_S);
    // Arms connecting
    px(c, hx-3, hy+1, VEST, 0.7);
    px(c, hx, hy+1, VEST, 0.7);

    // === Sweat / tear drops ===
    if (f % 25 === 0) {
      tears.push({
        x: 5 + Math.random()*0.5, y: by+1,
        vy: 0.15, life: 18, side: 'left'
      });
      tears.push({
        x: 9 + Math.random()*0.5, y: by+1,
        vy: 0.15, life: 18, side: 'right'
      });
    }
    tears.forEach(t => {
      t.y += t.vy; t.life--;
      px(c, Math.round(t.x), Math.round(t.y), AMBER_L, t.life/20);
    });
    tears = tears.filter(t => t.life > 0);

    // === Amber glow from below — warm pleading light ===
    const glowPulse = 0.04 + Math.sin(f*0.06)*0.025;
    for (let dx = -2; dx <= 2; dx++) {
      px(c, 7+dx, by+7, AMBER, glowPulse * (1 - Math.abs(dx)*0.3));
      px(c, 7+dx, by+8, AMBER, glowPulse * 0.5 * (1 - Math.abs(dx)*0.3));
    }

    // === "please" text fading in and out ===
    const textAlpha = 0.15 + Math.sin(f*0.04)*0.12;
    // p
    px(c, 1, 3, AMBER, textAlpha*0.4);
    // Dots "..." trailing
    const dotPhase = f % 60;
    if (dotPhase > 10) px(c, 12, by+3, AMBER_L, textAlpha*0.5);
    if (dotPhase > 25) px(c, 13, by+3, AMBER_L, textAlpha*0.5);
    if (dotPhase > 40) px(c, 14, by+3, AMBER_L, textAlpha*0.5);

    f++; requestAnimationFrame(draw);
  })();
})();
</script>
